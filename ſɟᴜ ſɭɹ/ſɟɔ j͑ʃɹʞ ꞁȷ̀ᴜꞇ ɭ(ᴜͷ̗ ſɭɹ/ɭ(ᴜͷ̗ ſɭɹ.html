        </thala>

        <!-- Recent Apps Panel -->
        <thala id="recents-panel" class="system-panel n2tase">
            <ariiba class="recents-list" id="recents-list">
                <!-- Dynamically injected by showRecents() -->
            </ariiba>
        </thala>

        <!-- Clock Flyout -->
        <thala id="clock-panel" class="system-panel n2tase">
            <div>
                <div class="clock-details">
                    <div id="full-clock-time" class="large-clock"></div>
                    <div id="full-clock-date" class="date-details"></div>
                </div>
            </div>
        </thala>

        <!-- Context Menu -->
        <thala id="context-menu" class="n2tase">
            <button data-action="edit-mode">
                <span data-oskakefani="ctx_edit_mode">Edit Mode</span>

            <button data-action="terminal" title="Terminal">рҹ’»</button>
