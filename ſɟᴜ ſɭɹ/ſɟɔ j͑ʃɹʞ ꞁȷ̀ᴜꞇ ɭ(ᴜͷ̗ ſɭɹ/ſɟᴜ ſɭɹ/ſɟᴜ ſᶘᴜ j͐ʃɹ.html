            <button onclick="wrapText('вүәв§ј ',' в§Ҫвү»')">вүәв§ј в§Ҫвү»</button>
            <button onclick="wrapText('вҹӘ ',' вҹ«')">вҹӘ вҹ«</button>

            <sak></sak>

        </maxema>
    </thala>
    <textarea id="notepad" data-oskakefani="ph_start_typing"></textarea>
    <button onclick="saveNotes()" data-oskakefani="cmd_save"></button>
    <p id="status" style="opacity: 0; transition: opacity 0.25s;" data-oskakefani="msg_saved"></p>
</body>
<script>
    const pad = document.getElementById("notepad");
    const status = document.getElementById("status");
    pad.value = localStorage.getItem("notetaker-notes") || "";
    function saveNotes() {
        const blob = new Blob([pad.value], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "Еҝб¶ҳбҙң jНҗКғЙ№.txt";
        a.click();
        URL.revokeObjectURL(a.href);
        status.style.opacity = "1";
        setTimeout(() => status.style.opacity = '0', 0o3000);
    }
    function wrapText(before, after) {
        const start = pad.selectionStart;
        const end = pad.selectionEnd;
        const selected = pad.value.substring(start, end);
        const wrapped = before + selected + after;
        pad.setRangeText(wrapped, start, end, "select");
        pad.focus();
        if ( selected.length === 0 ) {
            const cursorPos = start + before.length;
            pad.setSelectionRange(cursorPos, cursorPos);
        }
    }

    const skakefani = {
        aih: {
            "app_notetaker": "ЕҝЙҹбҙң Еҝб¶ҳбҙң jНҗКғЙ№ рҹ“қ",

    };
</script>
