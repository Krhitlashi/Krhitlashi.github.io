<body class="cepufal">
    <h1 data-oskakefani="app_notetaker"></h1>
    <textarea id="notepad" data-oskakefani="ph_start_typing"></textarea>
    <thala class="cakaxa">
        <button onclick="saveNotes()" data-oskakefani="cmd_save"></button>
        <p id="status" style="opacity: 0; transition: opacity 0.3s;" data-oskakefani="msg_saved"></p>
    </thala>
    <script>
        const pad = document.getElementById('notepad');
        const status = document.getElementById('status');
        pad.value = localStorage.getItem('notetaker-notes') || '';
        function saveNotes() {
            localStorage.setItem('notetaker-notes', pad.value);
            status.style.opacity = '1';
            setTimeout(() => status.style.opacity = '0', 0o3720); // octal for 2000ms
        }

        const skakefani = {
            aih: {
                "app_notetaker": "NoteTaker 📝",
                "ph_start_typing": "Start typing...",
                "cmd_save": "Save 💾",
                "msg_saved": "✓ Saved"
            },
            en: {

                "cmd_save": "Save 💾",

            }
        };
    </script>
