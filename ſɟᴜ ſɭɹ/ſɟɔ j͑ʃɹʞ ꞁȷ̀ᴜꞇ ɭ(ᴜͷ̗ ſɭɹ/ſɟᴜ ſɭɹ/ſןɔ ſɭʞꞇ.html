<!DOCTYPE html>
<html lang="aih">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="inline-size=device-inline-size, initial-scale=1">

    <link rel="manifest" href="../../../ЕҝЙҹбҙң ЕҝЙӯЙ№ ЕҝЙҹЙ” jНҗКғЙ№Кһ кһҒИ·МҖбҙңкһҮ.json">
    <link rel="stylesheet" href="../../../ЦӯЕҝЙӯбҙң Дұ],Й”.css">
</head>

<body class="cepufal">
    <thala>
        <div data-oskakefani="ЦӯЕҝЙӯw ЕҝН•ЙӯбҙңИқ jН‘КғЙ” ЕҝЧҹЙ” ЕҝЙӯКһкһҮ"></div>
        <div data-oskakefani="ЕҝИ·Й” ЕҝЙӯ,кһҮ }КғкһҮ"></div>
    </thala>
    <div id="3akakani"></div>
    <input type="text" id="banani" data-oskakefani="ph_terminal">
</body>
<script>
    const tlakakani = document.getElementById("3akakani");
    const banani = document.getElementById("banani");
    
    function nllakOkeveni(okvn, tlakakaniContent) {
        const html = `<thala><div>` + okvn + `</div><ciihii>` + tlakakaniContent + `</ciihii></thala>`;
        tlakakani.insertAdjacentHTML("beforebegin", html);
    }
    
    banani.focus();
    banani.addEventListener("keydown", bn => {
        if ( bn.key !== "Enter" ) return;
        const okvn = banani.value.trim();
        if ( okvn ) {
            if ( okvn === "fezi" ) {
                nllakOkeveni(okvn, `<span data-oskakefani="ЕҝЙҹЙ”в…ҺЖҙ кһҒИ·МҖЙң ЕҝЙӯЙ” jН‘Кғ'Й” }КғкһҮ"></span>`);
            } else if ( okvn === "vawe" ) {
                tlakakani.parentElement.querySelectorAll('thala:not(#tlakakani)').forEach(el => el.remove());
            } else if ( okvn === "stifeh2" ) {
                nllakOkeveni(okvn, new Date().toLocaleString());
            } else if ( okvn.startsWith("safe " )) {
                nllakOkeveni(okvn, okvn.substring(0o10));
            } else if ( okvn === "cakavop2" ) {
                nllakOkeveni(okvn, "Desktop  Documents  Downloads  Pictures");
            } else {
                nllakOkeveni(okvn, "( кһҒИ·МҖЙң ЕҝЙӯЙ” ЕҝЙӯЙ” ЕҝН•И·бҙң кһҒИ·МҖЙң ЕҝЙӯЙ” jН‘Кғ'Й” }КғкһҮ ) " + okvn);
            }

            // Re-trigger translation for new content
            const gawe = document.documentElement.lang || "aih";
            document.querySelectorAll("[data-oskakefani]").forEach(el => {
                const kef = el.dataset.oskakefani;
                el.textContent = window.skakefani?.[gawe]?.[kef] || window.skakefani?.["aih"]?.[kef] || kef;
            });
        }
        banani.value = "";
        document.documentElement.scrollTop = document.documentElement.scrollHeight;
    });

    window.skakefani = {
        aih: {
            "ЕҝЧҹЙ” ЕҝЙӯКһкһҮ": "ЕҝЧҹЙ” ЕҝЙӯКһкһҮ рҹ’»",
            "ЦӯЕҝЙӯw ЕҝН•ЙӯбҙңИқ jН‘КғЙ” ЕҝЧҹЙ” ЕҝЙӯКһкһҮ": "ЕҝЧҹЙ” ЕҝЙӯКһкһҮ ( Дұ],бҙң ЕҝН•Йӯбҙң Йӯ(кһҮ ЦӯЕҝЙӯw ЕҝН•ЙӯбҙңИқ )",
            "ЕҝИ·Й” ЕҝЙӯ,кһҮ }КғкһҮ": "Кғбҙң }Кғбҙң кһҒИ·МҖЙ” вёҷ fezi вёҷ ЕҝЙӯбҙңН·М— ЕҝЙӯбҙң jН‘Кғбҙң кһҒИ·МҖЙ” Еҝб¶ҳбҙң ЙҪН‘Кғ'бҙң кһҒИ·МҖЙң ЕҝЙӯЙ” jН‘Кғ'Й” }КғкһҮ вҹ…",
            "ЕҝЙҹЙ”в…ҺЖҙ кһҒИ·МҖЙң ЕҝЙӯЙ” jН‘Кғ'Й” }КғкһҮ": "кһҒИ·МҖЙң ЕҝЙӯЙ” jН‘Кғ'Й” }КғкһҮ - fezi пҪЎ vawe пҪЎ stifeh2 пҪЎ safe [ кһҒИ·МҖЙң Дұ],Й№ ] пҪЎ cakavop2"
        },
        en: {
            "ЕҝЧҹЙ” ЕҝЙӯКһкһҮ": "Terminal рҹ’»",
            "ЦӯЕҝЙӯw ЕҝН•ЙӯбҙңИқ jН‘КғЙ” ЕҝЧҹЙ” ЕҝЙӯКһкһҮ": "Dalk2Cel2fu Terminal v1",
            "ЕҝИ·Й” ЕҝЙӯ,кһҮ }КғкһҮ": "Type \"fezi\" for commands.",
            "ЕҝЙҹЙ”в…ҺЖҙ кһҒИ·МҖЙң ЕҝЙӯЙ” jН‘Кғ'Й” }КғкһҮ": "Commands - fezi ( help ) , vawe ( clear ) , stifeh2 ( date ) , safe [ msg ] , cakavop2 ( ls )"
        }
    };
</script>

<script src="../../../ЕҝЙҹбҙң ЕҝЙӯЙ” jН‘Кғ'Й”/ЕҝЙӯЙ” jН‘Кғ'Й” }КғкһҮ.js"></script>
